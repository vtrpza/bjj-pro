<style>
:root {
  --c-primary: #000000;
  --c-primary-contrast: #ffffff;
  --c-accent: #d4af37;
  --c-bg: #f6f6f7;
  --c-surface: #ffffff;
  --c-surface-2: #fafafa;
  --c-text: #111111;
  --c-text-dim: #6b7280;
  --c-border: #e5e7eb;
  --c-success: #10b981;
  --c-warn: #f59e0b;
  --c-danger: #ef4444;
  --c-info: #3b82f6;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
  --shadow: 0 4px 16px rgba(0,0,0,.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.14);
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--c-bg);
  color: var(--c-text);
  font-size: 15px;
  line-height: 1.45;
  min-height: 100vh;
  overscroll-behavior: none;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; font-size: 15px; }
a { color: inherit; text-decoration: none; }
h1, h2, h3, h4 { margin: 0 0 .5rem; font-weight: 700; letter-spacing: -.01em; }
h1 { font-size: 1.6rem; } h2 { font-size: 1.25rem; } h3 { font-size: 1.05rem; }
p { margin: 0 0 .5rem; }
.hidden { display: none !important; }

/* ---------- LAYOUT APP ---------- */
.app { min-height: 100vh; display: flex; flex-direction: column; }

/* Topbar (desktop) */
.topbar {
  position: sticky; top: 0; z-index: 40;
  background: var(--c-primary);
  color: var(--c-primary-contrast);
  padding: 12px 24px;
  display: flex; align-items: center; gap: 16px;
  box-shadow: var(--shadow);
}
.topbar .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; }
.topbar .brand img { width: 34px; height: 34px; object-fit: contain; border-radius: 6px; background: var(--c-primary-contrast); padding: 3px; }
.topbar .brand-name { font-size: 1.05rem; letter-spacing: .02em; text-transform: uppercase; }
.topbar .spacer { flex: 1; }
.topbar .user-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px 6px 6px;
  background: rgba(255,255,255,.12); border-radius: 999px;
  font-size: .9rem;
}
.topbar .user-chip .avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--c-accent); color: #000; display: grid; place-items: center;
  font-weight: 700; font-size: .8rem;
}
.topbar .icon-btn {
  width: 38px; height: 38px; display: grid; place-items: center;
  border-radius: 10px; color: var(--c-primary-contrast);
  transition: background .15s;
}
.topbar .icon-btn:hover { background: rgba(255,255,255,.12); }

/* Main layout w/ sidebar */
.main-wrap { flex: 1; display: flex; }
.sidebar {
  width: 240px; background: var(--c-surface); border-right: 1px solid var(--c-border);
  padding: 18px 12px; flex-shrink: 0;
  display: flex; flex-direction: column; gap: 4px;
}
.sidebar .nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 10px;
  color: var(--c-text); font-weight: 500; font-size: .95rem;
  transition: background .15s, color .15s;
}
.sidebar .nav-item .icon { width: 20px; height: 20px; flex-shrink: 0; }
.sidebar .nav-item:hover { background: var(--c-bg); }
.sidebar .nav-item.active { background: var(--c-primary); color: var(--c-primary-contrast); }
.sidebar .nav-item.active .icon { color: var(--c-primary-contrast); }
.sidebar .nav-divider { height: 1px; background: var(--c-border); margin: 8px 6px; }
.sidebar .nav-label { font-size: .72rem; text-transform: uppercase; color: var(--c-text-dim); padding: 6px 14px 2px; letter-spacing: .04em; }

.content { flex: 1; padding: 28px 32px 80px; max-width: 1280px; width: 100%; }

/* Mobile bottom nav */
.bottom-nav { display: none; }

/* ---------- CARDS / UI ---------- */
.page-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.page-title h1 { margin: 0; }
.page-subtitle { color: var(--c-text-dim); margin-top: -8px; margin-bottom: 20px; }

.card {
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--radius); padding: 20px;
  box-shadow: var(--shadow-sm);
}
.card + .card { margin-top: 16px; }
.card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 8px; }
.card-header h2, .card-header h3 { margin: 0; }

.grid { display: grid; gap: 16px; }
.grid-2 { grid-template-columns: repeat(2, 1fr); }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
@media (max-width: 980px) { .grid-4, .grid-3 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 600px) { .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; } }

/* KPIs */
.kpi {
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--radius); padding: 18px; position: relative; overflow: hidden;
}
.kpi .kpi-icon {
  position: absolute; right: 14px; top: 14px;
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--c-primary); color: var(--c-primary-contrast);
  display: grid; place-items: center;
}
.kpi .kpi-label { color: var(--c-text-dim); font-size: .8rem; text-transform: uppercase; letter-spacing: .04em; }
.kpi .kpi-value { font-size: 1.8rem; font-weight: 800; margin-top: 4px; letter-spacing: -.02em; }
.kpi .kpi-delta { font-size: .8rem; margin-top: 4px; color: var(--c-text-dim); }
.kpi .kpi-delta.up { color: var(--c-success); }
.kpi .kpi-delta.down { color: var(--c-danger); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 10px 18px; border-radius: 10px; font-weight: 600;
  background: var(--c-primary); color: var(--c-primary-contrast);
  font-size: .9rem; transition: transform .1s, opacity .15s, box-shadow .15s;
  border: 1px solid transparent;
}
.btn:hover { opacity: .92; }
.btn:active { transform: translateY(1px); }
.btn.secondary { background: var(--c-surface); color: var(--c-text); border-color: var(--c-border); }
.btn.secondary:hover { background: var(--c-bg); opacity: 1; }
.btn.accent { background: var(--c-accent); color: #000; }
.btn.danger { background: var(--c-danger); color: #fff; }
.btn.success { background: var(--c-success); color: #fff; }
.btn.small { padding: 6px 12px; font-size: .8rem; }
.btn.block { width: 100%; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

/* Inputs */
.field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.field label { font-size: .85rem; color: var(--c-text-dim); font-weight: 500; }
.field input, .field select, .field textarea {
  padding: 11px 14px; border: 1px solid var(--c-border); border-radius: 10px;
  background: var(--c-surface); color: var(--c-text); outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color: var(--c-primary); box-shadow: 0 0 0 3px rgba(0,0,0,.06);
}
.field textarea { min-height: 80px; resize: vertical; }
.field .help { font-size: .75rem; color: var(--c-text-dim); }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .field-row { grid-template-columns: 1fr; } }

/* Tables */
.table-wrap { overflow: auto; border: 1px solid var(--c-border); border-radius: var(--radius); background: var(--c-surface); }
table { width: 100%; border-collapse: collapse; font-size: .9rem; }
th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--c-border); }
th { background: var(--c-surface-2); font-weight: 600; font-size: .78rem; text-transform: uppercase; color: var(--c-text-dim); letter-spacing: .03em; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--c-surface-2); }

/* Badges */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: 999px;
  font-size: .75rem; font-weight: 600; letter-spacing: .02em;
  background: var(--c-bg); color: var(--c-text);
}
.badge.success { background: rgba(16,185,129,.12); color: var(--c-success); }
.badge.warn { background: rgba(245,158,11,.14); color: #b45309; }
.badge.danger { background: rgba(239,68,68,.12); color: var(--c-danger); }
.badge.info { background: rgba(59,130,246,.12); color: var(--c-info); }
.badge.dark { background: #111; color: #fff; }

/* Belts (faixas) */
.belt-chip { display: inline-flex; align-items: center; gap: 8px; font-weight: 600; font-size: .85rem; }
.belt-bar { display: inline-block; width: 42px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,.25); position: relative; }
.belt-bar::after { content: ''; position: absolute; right: 4px; top: 1px; width: 6px; height: 10px; background: #111; border-radius: 2px; }
.belt-branca   { background: linear-gradient(to right, #f8f8f8 70%, #111 70%); }
.belt-azul     { background: linear-gradient(to right, #1e3a8a 70%, #111 70%); }
.belt-roxa     { background: linear-gradient(to right, #6d28d9 70%, #111 70%); }
.belt-marrom   { background: linear-gradient(to right, #713f12 70%, #111 70%); }
.belt-preta    { background: linear-gradient(to right, #111 70%, #dc2626 70%); }
.belt-preta::after { background: #dc2626; }
.belt-coral    { background: linear-gradient(to right, #111 40%, #dc2626 40% 70%, #111 70%); }
.belt-vermelha { background: linear-gradient(to right, #dc2626 70%, #111 70%); }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.55);
  display: grid; place-items: center; z-index: 100; padding: 16px;
  animation: fadeIn .2s;
}
.modal {
  background: var(--c-surface); border-radius: var(--radius); padding: 24px;
  max-width: 520px; width: 100%; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-lg); animation: slideUp .25s;
}
.modal.wide { max-width: 720px; }
.modal h2 { margin-bottom: 8px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; flex-wrap: wrap; }
.modal-close { float: right; width: 32px; height: 32px; border-radius: 8px; color: var(--c-text-dim); display: grid; place-items: center; margin: -8px -8px 0 0; }
.modal-close:hover { background: var(--c-bg); color: var(--c-text); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

/* Toast */
.toast-wrap { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast {
  background: #111; color: #fff; padding: 12px 18px; border-radius: 10px;
  box-shadow: var(--shadow-lg); font-size: .9rem; font-weight: 500;
  animation: toastIn .25s; pointer-events: auto; max-width: 90vw;
  display: flex; align-items: center; gap: 10px;
}
.toast.success { background: var(--c-success); }
.toast.danger { background: var(--c-danger); }
.toast.warn { background: var(--c-warn); color: #111; }
@keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

/* Forms inline */
.hstack { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.vstack { display: flex; flex-direction: column; gap: 10px; }

/* Progress bar */
.progress { height: 8px; background: var(--c-bg); border-radius: 999px; overflow: hidden; }
.progress > div { height: 100%; background: var(--c-primary); border-radius: 999px; transition: width .4s; }

/* Empty state */
.empty { padding: 40px 20px; text-align: center; color: var(--c-text-dim); }
.empty .icon { font-size: 2rem; margin-bottom: 8px; }

/* --------- LOGIN SCREEN --------- */
.login-screen {
  min-height: 100vh; display: grid; place-items: center;
  background: linear-gradient(135deg, #111 0%, #000 100%);
  padding: 20px;
}
.login-card {
  background: var(--c-surface); border-radius: 20px; padding: 40px 32px;
  max-width: 420px; width: 100%; box-shadow: var(--shadow-lg);
  animation: slideUp .35s;
}
.login-logo {
  width: 110px; height: 110px; margin: 0 auto 18px; display: grid; place-items: center;
  background: #fff; border-radius: 22px; padding: 10px;
  box-shadow: var(--shadow);
}
.login-logo img { width: 100%; height: 100%; object-fit: contain; }
.login-card h1 { text-align: center; font-size: 1.4rem; margin-bottom: 4px; }
.login-card .tag { text-align: center; color: var(--c-text-dim); margin-bottom: 26px; font-size: .9rem; }
.profile-btn {
  width: 100%; display: flex; align-items: center; gap: 14px;
  padding: 16px; border: 1px solid var(--c-border); border-radius: 14px;
  margin-bottom: 12px; transition: all .15s;
  text-align: left;
}
.profile-btn:hover { border-color: var(--c-primary); background: var(--c-surface-2); transform: translateY(-1px); box-shadow: var(--shadow); }
.profile-btn .icon-circle {
  width: 44px; height: 44px; border-radius: 12px; background: var(--c-primary); color: var(--c-primary-contrast);
  display: grid; place-items: center; flex-shrink: 0;
}
.profile-btn .title { font-weight: 700; font-size: 1rem; }
.profile-btn .sub { font-size: .82rem; color: var(--c-text-dim); }

.login-footer { text-align: center; margin-top: 20px; color: var(--c-text-dim); font-size: .8rem; }
.switch-academy {
  text-align: center; margin-top: 14px; font-size: .8rem; color: var(--c-text-dim);
}
.switch-academy a { color: var(--c-primary); font-weight: 600; }

/* --------- STUDENT SELECTION LIST --------- */
.student-pick {
  max-height: 300px; overflow: auto; margin-top: 10px;
  border: 1px solid var(--c-border); border-radius: 10px;
}
.student-pick .item {
  padding: 12px 14px; border-bottom: 1px solid var(--c-border);
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: background .15s;
}
.student-pick .item:hover { background: var(--c-surface-2); }
.student-pick .item:last-child { border-bottom: none; }
.student-pick .item .avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--c-primary); color: var(--c-primary-contrast);
  display: grid; place-items: center; font-weight: 700; font-size: .85rem;
}

/* Student dashboard card */
.status-card {
  background: linear-gradient(135deg, var(--c-primary), #222); color: var(--c-primary-contrast);
  padding: 24px; border-radius: var(--radius);
  position: relative; overflow: hidden;
}
.status-card.danger-card { background: linear-gradient(135deg, #dc2626, #991b1b); color: #fff; }
.status-card.warn-card { background: linear-gradient(135deg, #f59e0b, #b45309); color: #fff; }
.status-card.success-card { background: linear-gradient(135deg, #10b981, #047857); color: #fff; }
.status-card .label { text-transform: uppercase; font-size: .75rem; opacity: .8; letter-spacing: .05em; }
.status-card .value { font-size: 1.6rem; font-weight: 800; margin-top: 4px; }
.status-card .sub { font-size: .85rem; opacity: .85; margin-top: 4px; }

/* Check-in large button */
.checkin-btn {
  width: 100%; padding: 28px; border-radius: 20px;
  background: var(--c-primary); color: var(--c-primary-contrast);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  font-weight: 700; font-size: 1.1rem;
  box-shadow: var(--shadow);
  transition: transform .12s, box-shadow .2s, opacity .2s;
}
.checkin-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.checkin-btn:disabled { opacity: .5; cursor: not-allowed; }
.checkin-btn .icon { font-size: 2.2rem; }

/* Pix simulation */
.pix-qr {
  width: 200px; height: 200px; margin: 0 auto 14px;
  display: grid; place-items: center;
  background: repeating-conic-gradient(#111 0 25%, #fff 0 50%) 50% / 12px 12px;
  border: 10px solid #fff; border-radius: 12px;
  box-shadow: 0 0 0 1px var(--c-border);
}
.pix-code {
  font-family: ui-monospace, Menlo, Consolas, monospace;
  padding: 10px 14px; background: var(--c-surface-2);
  border: 1px dashed var(--c-border); border-radius: 10px;
  font-size: .78rem; word-break: break-all; margin-bottom: 10px;
}

/* --------- MOBILE ADJUSTMENTS --------- */
@media (max-width: 860px) {
  .topbar { padding: 10px 16px; }
  .topbar .brand-name { font-size: .95rem; }
  .sidebar { display: none; }
  .content { padding: 16px 14px 100px; }
  .bottom-nav {
    display: flex; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--c-surface); border-top: 1px solid var(--c-border);
    padding: 6px 4px 10px; justify-content: space-around; z-index: 50;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
  }
  .bottom-nav .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 8px 4px; border-radius: 10px; color: var(--c-text-dim); font-size: .68rem; font-weight: 600;
  }
  .bottom-nav .nav-item .icon { width: 22px; height: 22px; }
  .bottom-nav .nav-item.active { color: var(--c-primary); }
  .page-title h1 { font-size: 1.3rem; }
  .kpi .kpi-value { font-size: 1.4rem; }
  .kpi { padding: 14px; }
  .card { padding: 16px; }
  th, td { padding: 10px 8px; font-size: .82rem; }
  .topbar .user-chip .name { display: none; }
}

/* Scrollbars */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: #cfcfd4; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #b0b0b6; }

/* List layouts */
.list { display: flex; flex-direction: column; gap: 8px; }
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; border: 1px solid var(--c-border);
  border-radius: 12px; background: var(--c-surface);
  transition: border-color .15s;
}
.list-item:hover { border-color: var(--c-primary); }
.list-item .avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--c-primary); color: var(--c-primary-contrast);
  display: grid; place-items: center; font-weight: 700; font-size: .9rem; flex-shrink: 0;
}
.list-item .main { flex: 1; min-width: 0; }
.list-item .main .name { font-weight: 600; }
.list-item .main .sub { font-size: .82rem; color: var(--c-text-dim); }
.list-item .actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }

/* Settings swatches */
.swatch { width: 32px; height: 32px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: transform .1s; }
.swatch:hover { transform: scale(1.1); }
.swatch.selected { border-color: var(--c-accent); box-shadow: 0 0 0 2px #fff inset; }

/* Color input fields */
.color-input-wrap { display: flex; align-items: center; gap: 8px; }
.color-input-wrap input[type=color] { width: 44px; height: 40px; padding: 2px; border: 1px solid var(--c-border); border-radius: 8px; background: none; }
.color-input-wrap input[type=text] { flex: 1; }

/* Segment (tabs) */
.segment { display: inline-flex; background: var(--c-surface-2); border: 1px solid var(--c-border); border-radius: 10px; padding: 4px; gap: 2px; }
.segment button { padding: 6px 14px; border-radius: 8px; font-size: .85rem; font-weight: 600; color: var(--c-text-dim); }
.segment button.active { background: var(--c-primary); color: var(--c-primary-contrast); }

/* Hero status on student home */
.hero-mensalidade {
  border-radius: var(--radius); padding: 22px; color: #fff;
  position: relative; overflow: hidden;
}
.hero-mensalidade::before { content: ''; position: absolute; right: -60px; top: -60px; width: 180px; height: 180px; border-radius: 50%; background: rgba(255,255,255,.08); }
.hero-mensalidade::after { content: ''; position: absolute; right: -30px; bottom: -30px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,.06); }
.hero-mensalidade .top { font-size: .8rem; opacity: .85; text-transform: uppercase; letter-spacing: .04em; }
.hero-mensalidade .big { font-size: 2rem; font-weight: 800; margin-top: 4px; }
.hero-mensalidade .desc { font-size: .9rem; opacity: .9; margin-top: 6px; }
.hero-mensalidade .meta { font-size: .78rem; opacity: .85; margin-top: 10px; }

/* Alert banner */
.alert {
  padding: 12px 14px; border-radius: 10px; font-size: .88rem;
  display: flex; align-items: flex-start; gap: 10px; margin-bottom: 14px;
}
.alert.warn { background: rgba(245,158,11,.12); color: #92400e; border-left: 4px solid var(--c-warn); }
.alert.danger { background: rgba(239,68,68,.1); color: #991b1b; border-left: 4px solid var(--c-danger); }
.alert.info { background: rgba(59,130,246,.1); color: #1e40af; border-left: 4px solid var(--c-info); }
.alert.success { background: rgba(16,185,129,.1); color: #065f46; border-left: 4px solid var(--c-success); }
.alert .icon { flex-shrink: 0; }
.alert strong { display: block; margin-bottom: 2px; }
</style>
</head>

<body>

  <!-- Topbar -->

/* ---------- STORAGE ---------- */
const DB_KEY = 'gymapp_db_v1';
const SESSION_KEY = 'gymapp_session_v1';
let DB = null;
let SESSION = null;

function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(DB)); }
function loadDB() {
  const raw = localStorage.getItem(DB_KEY);
  if (raw) { try { DB = JSON.parse(raw); return; } catch(e) {} }
  DB = seedDB();
  saveDB();
}
function saveSession() { if (SESSION) localStorage.setItem(SESSION_KEY, JSON.stringify(SESSION)); else localStorage.removeItem(SESSION_KEY); }
function loadSession() {
  const raw = localStorage.getItem(SESSION_KEY);
  if (raw) { try { SESSION = JSON.parse(raw); } catch(e) { SESSION = null; } }
}

const GRAUS_PARA_FAIXA = 4; // 4 graus para promover (simplificado)

function faixaTitle(f) { return f.charAt(0).toUpperCase() + f.slice(1); }

function faixaChip(faixa, graus) {
  const cls = 'belt-' + faixa;
  return `<span class="belt-chip"><span class="belt-bar ${cls}"></span> ${faixaTitle(faixa)}${graus ? ' · ' + graus + 'g' : ''}</span>`;
}

    const id = 'stu_' + i.toString().padStart(3, '0');
    const [nome, sexo, cat, faixa, graus] = n;
    students.push({
      id,
      nome,
      sexo,
      email: nome.toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/ /g, '.') + '@email.com',

      faixa,
      graus,

      dataVencimento: (() => {

        if (i === 2) d.setDate(d.getDate() - 8); // vencido

      d.setMonth(d.getMonth() - m);
      payments.push({
        id: uid(),
        studentId: s.id,
        valor: s.mensalidadeValor,
        data: d.toISOString().slice(0, 10),
        metodo: ['pix', 'credito', 'debito', 'dinheiro'][m % 4],
        status: 'pago',
        competencia: d.toISOString().slice(0, 7),
      });
    }
    // Corrente: para alunos com vencimento passado, não há pagamento atual
    if (s.dataVencimento >= new Date().toISOString().slice(0,10)) {

        studentId: s.id,
        valor: s.mensalidadeValor,

/* ---------- UTILITIES ---------- */
const BRL = v => 'R$ ' + (v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const todayISO = () => new Date().toISOString().slice(0, 10);
const brDate = iso => { if (!iso) return '-'; const [y,m,d] = iso.slice(0,10).split('-'); return `${d}/${m}/${y}`; };
const diffDays = iso => { if (!iso) return null; const a = new Date(iso+'T00:00:00'), b = new Date(todayISO()+'T00:00:00'); return Math.round((a-b)/(1000*60*60*24)); };
const initials = nome => nome.split(' ').filter(Boolean).slice(0,2).map(w => w[0]).join('').toUpperCase();

function fmtMonth(ym) {
  const [y, m] = ym.split('-');
  const names = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  return `${names[parseInt(m,10)-1]}/${y.slice(2)}`;
}

/* ---------- TOAST ---------- */
function toast(msg, type = '', ms = 2600) {
  const host = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .25s'; setTimeout(() => el.remove(), 300); }, ms);
}

/* ---------- MODAL ---------- */
function openModal(html, opts = {}) {
  const host = document.getElementById('modalHost');
  host.innerHTML = `<div class="modal-backdrop"><div class="modal${opts.wide ? ' wide' : ''}">${html}</div></div>`;
  host.querySelector('.modal-backdrop').addEventListener('click', e => {
    if (e.target.classList.contains('modal-backdrop')) closeModal();
  });
  return host.querySelector('.modal');
}
function closeModal() { document.getElementById('modalHost').innerHTML = ''; }

/* ---------- THEME ---------- */
function currentAcademy() {
  return DB.academies.find(a => a.id === DB.currentAcademyId) || DB.academies[0];
}

function applyTheme() {
  const a = currentAcademy();
  const r = document.documentElement.style;
  r.setProperty('--c-primary', a.primary);
  r.setProperty('--c-primary-contrast', a.primaryContrast);
  r.setProperty('--c-accent', a.accent);
  // Login screen
  document.getElementById('loginLogo').src = a.logo;
  document.getElementById('loginAcademyName').textContent = a.nome;
  document.getElementById('loginTagline').textContent = a.tagline || 'Gestão completa da sua academia';
  // Topbar
  const brandLogo = document.getElementById('brandLogo');
  if (brandLogo) brandLogo.src = a.logo;
  const brandName = document.getElementById('brandName');
  if (brandName) brandName.textContent = a.nome;
  // Meta theme
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', a.primary);
  document.title = `${a.nome} — Gestão de Academia`;
}

   LOGIN / SESSION
   ================================================================ */
function showLogin() {
  SESSION = null;
  saveSession();
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('appRoot').classList.add('hidden');
  applyTheme();
}

function loginAs(role) {
  if (role === 'academia') {
    SESSION = { role: 'academia', academyId: currentAcademy().id };
    saveSession();
    enterApp();
  } else if (role === 'aluno') {
    // Pick a student
    openStudentPicker();
  }
}

function openStudentPicker() {
  const items = DB.students.map(s => `
    <div class="item" data-id="${s.id}">
      <div class="avatar">${initials(s.nome)}</div>
      <div style="flex:1;">
        <div style="font-weight:600">${s.nome}</div>
        <div style="font-size:.8rem;color:var(--c-text-dim)">${faixaTitle(s.faixa)} · ${s.categoria}</div>
      </div>
    </div>
  `).join('');
  const modal = openModal(`
    <button class="modal-close" onclick="closeModal()">${ICO.close}</button>
    <h2>Entrar como aluno</h2>
    <p style="color:var(--c-text-dim);font-size:.88rem">Selecione o aluno abaixo para acessar o app com o perfil dele. (Na versão final, cada aluno tem e-mail e senha próprios.)</p>
    <div class="student-pick">${items}</div>
  `);
  modal.querySelectorAll('.student-pick .item').forEach(el => {
    el.addEventListener('click', () => {
      SESSION = { role: 'aluno', studentId: el.dataset.id, academyId: currentAcademy().id };
      saveSession();
      closeModal();
      enterApp();
    });
  });
}

function enterApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appRoot').classList.remove('hidden');
  applyTheme();
  document.getElementById('brandRole').textContent = SESSION.role === 'academia' ? 'Gestão' : 'Meu perfil';
  const user = SESSION.role === 'academia'
    ? { nome: currentAcademy().nome }
    : DB.students.find(s => s.id === SESSION.studentId);
  document.getElementById('userName').textContent = user.nome;
  document.getElementById('userAvatar').textContent = initials(user.nome);
  renderNav();
  // Default page
  const def = SESSION.role === 'academia' ? 'dashboard' : 'home';
  goToPage(def);
}

function logout() {
  SESSION = null;
  saveSession();
  showLogin();
}

/* ================================================================
   NAVIGATION
   ================================================================ */
const NAV_ACADEMIA = [
  { id: 'dashboard', label: 'Visão Geral', icon: ICO.home },
  { id: 'alunos', label: 'Alunos', icon: ICO.users },
  { id: 'checkins', label: 'Check-ins', icon: ICO.check },
  { id: 'financeiro', label: 'Financeiro', icon: ICO.money },
  { id: 'graduacao', label: 'Graduação', icon: ICO.belt },
  { id: 'config', label: 'Configurações', icon: ICO.settings },
];
const NAV_ALUNO = [
  { id: 'home', label: 'Início', icon: ICO.home },
  { id: 'checkin', label: 'Check-in', icon: ICO.check },
  { id: 'mensalidade', label: 'Mensalidade', icon: ICO.money },
  { id: 'minha-graduacao', label: 'Graduação', icon: ICO.belt },
  { id: 'perfil', label: 'Perfil', icon: ICO.user },
];

let CURRENT_PAGE = null;

function renderNav() {
  const items = SESSION.role === 'academia' ? NAV_ACADEMIA : NAV_ALUNO;
  const sidebar = document.getElementById('sidebar');
  const bottom = document.getElementById('bottomNav');
  sidebar.innerHTML = `<div class="nav-label">Menu</div>` + items.map(i => `
    <button class="nav-item" data-page="${i.id}">${i.icon}<span>${i.label}</span></button>
  `).join('');
  bottom.innerHTML = items.slice(0, 5).map(i => `
    <button class="nav-item" data-page="${i.id}">${i.icon}<span>${i.label}</span></button>
  `).join('');

  [sidebar, bottom].forEach(nav => {
    nav.querySelectorAll('[data-page]').forEach(btn => {
      btn.addEventListener('click', () => goToPage(btn.dataset.page));
    });
  });
}

function goToPage(page) {
  CURRENT_PAGE = page;
  document.querySelectorAll('.sidebar [data-page], .bottom-nav [data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  const content = document.getElementById('pageContent');
  // Academia pages
  if (SESSION.role === 'academia') {
    const map = {
      dashboard: pageAcademyDashboard,
      alunos: pageAcademyAlunos,
      checkins: pageAcademyCheckins,
      financeiro: pageAcademyFinanceiro,
      graduacao: pageAcademyGraduacao,
      config: pageAcademyConfig,
    };
    (map[page] || pageAcademyDashboard)(content);
  } else {
    const map = {
      home: pageStudentHome,
      checkin: pageStudentCheckin,
      mensalidade: pageStudentMensalidade,
      'minha-graduacao': pageStudentGraduacao,
      perfil: pageStudentPerfil,
    };
    (map[page] || pageStudentHome)(content);
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}


/* ================================================================
   ACADEMIA — PAGES
   ================================================================ */

/* ----- Dashboard ----- */
function pageAcademyDashboard(root) {
  const ym = todayISO().slice(0,7);
  const payMonth = DB.payments.filter(p => p.competencia === ym && p.status === 'pago');
  const expMonth = DB.expenses.filter(e => e.data.slice(0,7) === ym);
  const receita = payMonth.reduce((a,p) => a + p.valor, 0);
  const despesa = expMonth.reduce((a,e) => a + e.valor, 0);
  const caixa = receita - despesa;

  const alunosAtivos = DB.students.filter(s => s.ativo).length;
  const vencendo = DB.students.filter(s => { const d = diffDays(s.dataVencimento); return d !== null && d <= 7 && d >= 0; }).length;
  const vencidos = DB.students.filter(s => { const d = diffDays(s.dataVencimento); return d !== null && d < 0; }).length;
  const pendentesCheckin = DB.checkins.filter(c => c.status === 'pendente').length;

  // Último 6 meses — gráfico simples em barras
  const labels = [];
  const dataReceita = [];
  const dataDespesa = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date();
    d.setMonth(d.getMonth() - i);
    const key = d.toISOString().slice(0,7);
    labels.push(fmtMonth(key));
    dataReceita.push(DB.payments.filter(p => p.competencia === key && p.status === 'pago').reduce((a,p) => a + p.valor, 0));
    dataDespesa.push(DB.expenses.filter(e => e.data.slice(0,7) === key).reduce((a,e) => a + e.valor, 0));
  }
  const maxVal = Math.max(...dataReceita, ...dataDespesa, 1);

  root.innerHTML = `
    <div class="page-title"><h1>Visão Geral</h1>
      <div class="btn-group">
        <button class="btn secondary" onclick="goToPage('checkins')">Check-ins pendentes (${pendentesCheckin})</button>
        <button class="btn accent" onclick="openModalNovoAluno()">${ICO.plus} Novo aluno</button>
      </div>
    </div>

    <div class="grid grid-4">
      <div class="kpi">
        <div class="kpi-icon">${ICO.money}</div>
        <div class="kpi-label">Caixa (mês)</div>
        <div class="kpi-value" style="color:${caixa >= 0 ? 'var(--c-success)' : 'var(--c-danger)'}">${BRL(caixa)}</div>
        <div class="kpi-delta">Receita ${BRL(receita)} · Despesa ${BRL(despesa)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">${ICO.bolt}</div>
        <div class="kpi-label">Recebido hoje</div>
        <div class="kpi-value">${BRL(DB.payments.filter(p => p.data === todayISO() && p.status === 'pago').reduce((a,p) => a + p.valor, 0))}</div>
        <div class="kpi-delta up">Atualizado em tempo real</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">${ICO.users}</div>
        <div class="kpi-label">Alunos ativos</div>
        <div class="kpi-value">${alunosAtivos}</div>
        <div class="kpi-delta">${vencendo} vencendo em 7d · ${vencidos} em atraso</div>
      </div>
      <div class="kpi">
        <div class="kpi-icon">${ICO.check}</div>
        <div class="kpi-label">Check-ins pendentes</div>
        <div class="kpi-value">${pendentesCheckin}</div>
        <div class="kpi-delta">Aguardando validação</div>
      </div>
    </div>

    <div class="grid grid-2" style="margin-top:16px;">
      <div class="card">
        <div class="card-header"><h3>Receita x Despesa (6 meses)</h3></div>
        <div style="display:flex; align-items:flex-end; gap:10px; height:180px; padding-top:6px;">
          ${labels.map((l,i) => `
            <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;">
              <div style="display:flex; align-items:flex-end; gap:3px; height:150px;">
                <div title="Receita: ${BRL(dataReceita[i])}" style="width:14px; background:var(--c-success); border-radius:3px 3px 0 0; height:${(dataReceita[i]/maxVal)*100}%"></div>
                <div title="Despesa: ${BRL(dataDespesa[i])}" style="width:14px; background:var(--c-danger); border-radius:3px 3px 0 0; height:${(dataDespesa[i]/maxVal)*100}%"></div>
              </div>
              <div style="font-size:.72rem; color:var(--c-text-dim); text-transform:uppercase;">${l}</div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:10px; display:flex; gap:16px; font-size:.82rem; color:var(--c-text-dim);">
          <span><span style="display:inline-block; width:10px; height:10px; background:var(--c-success); border-radius:2px"></span> Receita</span>
          <span><span style="display:inline-block; width:10px; height:10px; background:var(--c-danger); border-radius:2px"></span> Despesa</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h3>Alertas</h3></div>
        ${vencidos > 0 ? `<div class="alert danger">${ICO.alert}<div><strong>${vencidos} aluno(s) com mensalidade em atraso</strong>Verifique a lista de alunos para cobrança.</div></div>` : ''}
        ${vencendo > 0 ? `<div class="alert warn">${ICO.alert}<div><strong>${vencendo} mensalidade(s) vencem em até 7 dias</strong>Envie um lembrete aos alunos.</div></div>` : ''}
        ${pendentesCheckin > 0 ? `<div class="alert info">${ICO.info}<div><strong>${pendentesCheckin} check-in(s) aguardando validação</strong><a href="#" onclick="goToPage('checkins'); return false;" style="color:var(--c-info); text-decoration:underline;">Ir para check-ins</a></div></div>` : ''}
        ${vencidos === 0 && vencendo === 0 && pendentesCheckin === 0 ? `<div class="alert success">${ICO.info}<div><strong>Tudo em dia!</strong>Nenhuma pendência no momento.</div></div>` : ''}
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="card-header"><h3>Últimos pagamentos</h3><button class="btn secondary small" onclick="goToPage('financeiro')">Ver todos</button></div>
      ${renderPaymentsTable(DB.payments.slice().sort((a,b) => b.data.localeCompare(a.data)).slice(0,8))}
    </div>
  `;
}

function renderPaymentsTable(payments) {
  if (!payments.length) return `<div class="empty">Nenhum pagamento ainda</div>`;
  return `<div class="table-wrap"><table>
    <thead><tr><th>Aluno</th><th>Data</th><th>Competência</th><th>Valor</th><th>Método</th><th>Status</th></tr></thead>
    <tbody>${payments.map(p => {
      const s = DB.students.find(x => x.id === p.studentId);
      return `<tr>
        <td>${s ? s.nome : '—'}</td>
        <td>${brDate(p.data)}</td>
        <td>${fmtMonth(p.competencia)}</td>
        <td style="font-weight:600">${BRL(p.valor)}</td>
        <td><span class="badge">${metodoLabel(p.metodo)}</span></td>
        <td><span class="badge ${p.status === 'pago' ? 'success' : 'warn'}">${p.status}</span></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function metodoLabel(m) { return { pix: 'PIX', credito: 'Crédito', debito: 'Débito', dinheiro: 'Dinheiro' }[m] || m; }

/* ----- Alunos ----- */
function pageAcademyAlunos(root) {
  const statusOptions = `<option value="">Todos</option><option value="ativos">Ativos</option><option value="vencidos">Em atraso</option><option value="vencendo">Vencendo (7d)</option><option value="inativos">Inativos</option>`;
  root.innerHTML = `
    <div class="page-title"><h1>Alunos</h1>
      <div class="btn-group">
        <button class="btn accent" onclick="openModalNovoAluno()">${ICO.plus} Novo aluno</button>
      </div>
    </div>
    <div class="card">
      <div class="hstack" style="margin-bottom:12px;">
        <input id="filterNome" type="text" placeholder="Buscar por nome, e-mail..." style="flex:1; padding:10px 14px; border:1px solid var(--c-border); border-radius:10px; min-width:200px;">
        <select id="filterStatus" style="padding:10px 14px; border:1px solid var(--c-border); border-radius:10px;">${statusOptions}</select>
        <select id="filterFaixa" style="padding:10px 14px; border:1px solid var(--c-border); border-radius:10px;">
          <option value="">Todas as faixas</option>
          ${[...FAIXAS_ADULTO, ...FAIXAS_INFANTIL].map(f => `<option value="${f}">${faixaTitle(f)}</option>`).join('')}
        </select>
      </div>
      <div id="alunosList"></div>
    </div>
  `;

  function render() {
    const q = document.getElementById('filterNome').value.toLowerCase();
    const st = document.getElementById('filterStatus').value;
    const fx = document.getElementById('filterFaixa').value;
    let list = DB.students.slice();
    if (q) list = list.filter(s => s.nome.toLowerCase().includes(q) || (s.email||'').toLowerCase().includes(q));
    if (fx) list = list.filter(s => s.faixa === fx);
    if (st === 'ativos') list = list.filter(s => s.ativo);
    if (st === 'inativos') list = list.filter(s => !s.ativo);
    if (st === 'vencidos') list = list.filter(s => { const d = diffDays(s.dataVencimento); return d !== null && d < 0; });
    if (st === 'vencendo') list = list.filter(s => { const d = diffDays(s.dataVencimento); return d !== null && d <= 7 && d >= 0; });

    const html = list.length ? list.map(s => {
      const d = diffDays(s.dataVencimento);
      let badge;
      if (!s.ativo) badge = `<span class="badge">Inativo</span>`;
      else if (d < 0) badge = `<span class="badge danger">Atrasada ${Math.abs(d)}d</span>`;
      else if (d <= 7) badge = `<span class="badge warn">Vence em ${d}d</span>`;
      else badge = `<span class="badge success">Em dia</span>`;
      return `<div class="list-item">
        <div class="avatar">${initials(s.nome)}</div>
        <div class="main">
          <div class="name">${s.nome}</div>
          <div class="sub">${faixaChip(s.faixa, s.graus)} · ${s.categoria} · ${s.telefone || ''}</div>
        </div>
        <div style="text-align:right;">
          ${badge}
          <div style="font-size:.78rem; color:var(--c-text-dim); margin-top:4px;">Vence ${brDate(s.dataVencimento)}</div>
        </div>
        <div class="actions">
          <button class="btn small secondary" onclick="openModalAluno('${s.id}')">${ICO.edit}</button>
        </div>
      </div>`;
    }).join('') : `<div class="empty">Nenhum aluno encontrado</div>`;

    document.getElementById('alunosList').innerHTML = `<div class="list">${html}</div>`;
  }
  render();
  ['filterNome','filterStatus','filterFaixa'].forEach(id => document.getElementById(id).addEventListener('input', render));
}

function openModalNovoAluno() { openModalAluno(null); }

function openModalAluno(id) {
  const isNew = !id;
  const s = isNew ? {
    id: 'stu_' + uid(), nome: '', sexo: 'M', email: '', telefone: '', nascimento: '',
    categoria: 'adulto', faixa: 'branca', graus: 0, presencasValidadas: 0,
    mensalidadeValor: 220, dataVencimento: todayISO(), matricula: todayISO(), ativo: true,
  } : JSON.parse(JSON.stringify(DB.students.find(x => x.id === id)));

  const faixas = s.categoria === 'adulto' ? FAIXAS_ADULTO : FAIXAS_INFANTIL;

  openModal(`
    <button class="modal-close" onclick="closeModal()">${ICO.close}</button>
    <h2>${isNew ? 'Novo aluno' : 'Editar aluno'}</h2>
    <div class="field"><label>Nome completo</label><input id="f_nome" value="${s.nome}" placeholder="Ex.: João da Silva"></div>
    <div class="field-row">
      <div class="field"><label>E-mail</label><input id="f_email" value="${s.email||''}" placeholder="nome@email.com"></div>
      <div class="field"><label>Telefone</label><input id="f_tel" value="${s.telefone||''}" placeholder="(11) 99999-9999"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Sexo</label><select id="f_sexo"><option value="M" ${s.sexo==='M'?'selected':''}>Masculino</option><option value="F" ${s.sexo==='F'?'selected':''}>Feminino</option><option value="O" ${s.sexo==='O'?'selected':''}>Outro</option></select></div>
      <div class="field"><label>Nascimento</label><input id="f_nasc" type="date" value="${s.nascimento||''}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Categoria</label><select id="f_cat">
        <option value="adulto" ${s.categoria==='adulto'?'selected':''}>Adulto</option>
        <option value="infantil" ${s.categoria==='infantil'?'selected':''}>Infantil</option>
      </select></div>
      <div class="field"><label>Faixa</label><select id="f_faixa">${faixas.map(f => `<option value="${f}" ${s.faixa===f?'selected':''}>${faixaTitle(f)}</option>`).join('')}</select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Graus</label><input id="f_graus" type="number" min="0" max="4" value="${s.graus||0}"></div>
      <div class="field"><label>Mensalidade (R$)</label><input id="f_mens" type="number" min="0" step="10" value="${s.mensalidadeValor||220}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Matrícula</label><input id="f_mat" type="date" value="${s.matricula||todayISO()}"></div>
      <div class="field"><label>Vencimento da mensalidade</label><input id="f_venc" type="date" value="${s.dataVencimento||todayISO()}"></div>
    </div>
    <div class="field"><label><input id="f_ativo" type="checkbox" ${s.ativo?'checked':''}> Aluno ativo</label></div>
    <div class="modal-actions">
      ${!isNew ? `<button class="btn danger" onclick="deleteAluno('${s.id}')">${ICO.trash} Excluir</button>` : ''}
      <button class="btn secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn" onclick="salvarAluno('${s.id}', ${isNew})">Salvar</button>
    </div>
  `);

  // Dinâmico: ao mudar categoria, atualizar lista de faixas
  document.getElementById('f_cat').addEventListener('change', e => {
    const newCat = e.target.value;
    const newFaixas = newCat === 'adulto' ? FAIXAS_ADULTO : FAIXAS_INFANTIL;
    const sel = document.getElementById('f_faixa');
    sel.innerHTML = newFaixas.map(f => `<option value="${f}">${faixaTitle(f)}</option>`).join('');
  });
}

function salvarAluno(id, isNew) {
  const v = k => document.getElementById('f_' + k).value;
  const nome = v('nome').trim();
  if (!nome) { toast('Informe o nome', 'danger'); return; }

  const obj = {
    id,
    nome,
    email: v('email'),
    telefone: v('tel'),
    sexo: v('sexo'),
    nascimento: v('nasc'),
    categoria: v('cat'),
    faixa: v('faixa'),
    graus: parseInt(v('graus'), 10) || 0,
    mensalidadeValor: parseFloat(v('mens')) || 0,
    matricula: v('mat'),
    dataVencimento: v('venc'),
    ativo: document.getElementById('f_ativo').checked,
    presencasValidadas: isNew ? 0 : DB.students.find(x => x.id === id).presencasValidadas,
  };
  if (isNew) DB.students.push(obj);
  else {
    const idx = DB.students.findIndex(x => x.id === id);
    DB.students[idx] = { ...DB.students[idx], ...obj };
  }
  saveDB();
  closeModal();
  toast(isNew ? 'Aluno cadastrado' : 'Aluno atualizado', 'success');
  goToPage(CURRENT_PAGE);
}

function deleteAluno(id) {
  if (!confirm('Excluir este aluno? Esta ação não poderá ser desfeita.')) return;
  DB.students = DB.students.filter(s => s.id !== id);
  DB.payments = DB.payments.filter(p => p.studentId !== id);
  DB.checkins = DB.checkins.filter(c => c.studentId !== id);
  saveDB();
  closeModal();
  toast('Aluno excluído', 'danger');
  goToPage(CURRENT_PAGE);
}

/* ----- Check-ins (validação) ----- */
function pageAcademyCheckins(root) {
  const pending = DB.checkins.filter(c => c.status === 'pendente').sort((a,b) => (b.data+b.hora).localeCompare(a.data+a.hora));
  const validated = DB.checkins.filter(c => c.status === 'validado').sort((a,b) => (b.data+b.hora).localeCompare(a.data+a.hora)).slice(0, 30);

  root.innerHTML = `
    <div class="page-title"><h1>Check-ins</h1></div>
    <div class="segment" id="checkinTabs" style="margin-bottom:14px;">
      <button class="active" data-tab="pending">Pendentes (${pending.length})</button>
      <button data-tab="validated">Validados</button>
    </div>
    <div id="checkinContent"></div>
  `;

  const render = (tab) => {
    const list = tab === 'pending' ? pending : validated;
    if (!list.length) {
      document.getElementById('checkinContent').innerHTML = `<div class="card"><div class="empty">Nenhum check-in ${tab === 'pending' ? 'pendente' : 'validado'}</div></div>`;
      return;
    }
    const html = list.map(c => {
      const s = DB.students.find(x => x.id === c.studentId);
      return `<div class="list-item">
        <div class="avatar">${initials(s?.nome || '?')}</div>
        <div class="main">
          <div class="name">${s?.nome || '—'}</div>
          <div class="sub">${brDate(c.data)} às ${c.hora} · ${c.aula}</div>
        </div>
        <div style="text-align:right">
          <span class="badge ${c.status === 'pendente' ? 'warn' : 'success'}">${c.status}</span>
        </div>
        <div class="actions">
          ${c.status === 'pendente' ? `
            <button class="btn small success" onclick="validarCheckin('${c.id}')">Validar</button>
            <button class="btn small danger" onclick="removerCheckin('${c.id}')">${ICO.trash}</button>
          ` : `<button class="btn small secondary" onclick="removerCheckin('${c.id}')">${ICO.trash}</button>`}
        </div>
      </div>`;
    }).join('');
    document.getElementById('checkinContent').innerHTML = `<div class="list">${html}</div>`;
  };
  render('pending');
  document.querySelectorAll('#checkinTabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#checkinTabs button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render(btn.dataset.tab);
    });
  });
}

function validarCheckin(id) {
  const c = DB.checkins.find(x => x.id === id);
  if (!c) return;
  c.status = 'validado';
  // Atualiza contador de presenças do aluno
  const s = DB.students.find(x => x.id === c.studentId);
  if (s) s.presencasValidadas = (s.presencasValidadas || 0) + 1;
  saveDB();
  toast('Check-in validado', 'success');
  goToPage('checkins');
}

function removerCheckin(id) {
  if (!confirm('Remover este check-in?')) return;
  DB.checkins = DB.checkins.filter(c => c.id !== id);
  saveDB();
  goToPage('checkins');
}

function openModalRegistrarPagamento() {
  const opts = DB.students.map(s => `<option value="${s.id}">${s.nome}</option>`).join('');
  openModal(`
    <button class="modal-close" onclick="closeModal()">${ICO.close}</button>
    <h2>Registrar pagamento</h2>
    <div class="field"><label>Aluno</label><select id="f_aluno">${opts}</select></div>
    <div class="field-row">
      <div class="field"><label>Valor (R$)</label><input id="f_val" type="number" min="0" step="10" value="220"></div>
      <div class="field"><label>Método</label><select id="f_metodo"><option value="pix">PIX</option><option value="credito">Crédito</option><option value="debito">Débito</option><option value="dinheiro">Dinheiro</option></select></div>
    </div>

      <div class="field"><label>Data</label><input id="f_data" type="date" value="${todayISO()}"></div>

function salvarPagamento() {
  const sid = document.getElementById('f_aluno').value;
  const val = parseFloat(document.getElementById('f_val').value) || 0;
  const metodo = document.getElementById('f_metodo').value;
  const data = document.getElementById('f_data').value;
  const comp = document.getElementById('f_comp').value;
  DB.payments.push({ id: uid(), studentId: sid, valor: val, data, metodo, status: 'pago', competencia: comp });
  // Atualizar vencimento do aluno +30d
  const s = DB.students.find(x => x.id === sid);
  if (s) {
    const base = new Date(Math.max(new Date(s.dataVencimento).getTime(), Date.now()));
    base.setDate(base.getDate() + 30);
    s.dataVencimento = base.toISOString().slice(0,10);
  }
  saveDB(); closeModal(); toast('Pagamento registrado', 'success'); goToPage('financeiro');
}

function pageAcademyGraduacao(root) {
  const students = DB.students.slice().sort((a,b) => {
    const ord = FAIXAS_ADULTO.concat(FAIXAS_INFANTIL);
    return ord.indexOf(b.faixa) - ord.indexOf(a.faixa);
  });

  root.innerHTML = `
    <div class="page-title"><h1>Graduação</h1>
      <div class="hstack">
        <span style="color:var(--c-text-dim); font-size:.88rem">Aulas por grau: <strong>${DB.aulasPorGrau}</strong></span>
        <button class="btn small secondary" onclick="openModalConfigGrau()">Alterar</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><h3>Progresso dos alunos</h3></div>
      <div class="list">
        ${students.map(s => {
          const progresso = (s.presencasValidadas % DB.aulasPorGrau) / DB.aulasPorGrau * 100;
          const totalGraus = Math.floor(s.presencasValidadas / DB.aulasPorGrau);
          return `<div class="list-item">
            <div class="avatar">${initials(s.nome)}</div>
            <div class="main">
              <div class="name">${s.nome}</div>
              <div class="sub">${faixaChip(s.faixa, s.graus)} · ${s.presencasValidadas} presenças totais</div>
              <div class="progress" style="margin-top:6px"><div style="width:${progresso}%"></div></div>
              <div style="font-size:.75rem; color:var(--c-text-dim); margin-top:3px">Próximo grau: ${s.presencasValidadas % DB.aulasPorGrau}/${DB.aulasPorGrau}</div>
            </div>
            <div class="actions">
              <button class="btn small accent" onclick="graduarAluno('${s.id}', 'grau')">+ Grau</button>
              <button class="btn small" onclick="graduarAluno('${s.id}', 'faixa')">Promover faixa</button>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function graduarAluno(id, tipo) {
  const s = DB.students.find(x => x.id === id);
  if (!s) return;
  if (tipo === 'grau') {
    if (s.graus < GRAUS_PARA_FAIXA) { s.graus = (s.graus || 0) + 1; toast(`${s.nome}: novo grau!`, 'success'); }
    else toast('Aluno já tem todos os graus — promova a faixa', 'warn');
  } else {
    const ord = s.categoria === 'adulto' ? FAIXAS_ADULTO : FAIXAS_INFANTIL;
    const idx = ord.indexOf(s.faixa);
    if (idx >= 0 && idx < ord.length - 1) {
      s.faixa = ord[idx + 1];
      s.graus = 0;
      toast(`${s.nome} promovido(a) a ${faixaTitle(s.faixa)}!`, 'success');
    } else {
      toast('Aluno já está na faixa máxima', 'warn');
    }
  }
  saveDB(); goToPage('graduacao');
}

  openModal(`

    <h2>Aulas por grau</h2>
    <p style="color:var(--c-text-dim); font-size:.88rem">Define quantas presenças validadas são necessárias para cada grau da faixa.</p>

function myStudent() { return DB.students.find(s => s.id === SESSION.studentId); }

function mensalidadeStatus(s) {
  const d = diffDays(s.dataVencimento);
  if (d === null) return { key: 'sem', label: 'Sem mensalidade', color: 'var(--c-text-dim)', cls: '' };
  if (d < 0) return { key: 'vencida', label: 'Vencida', color: 'var(--c-danger)', cls: 'danger-card', dias: Math.abs(d) };
  if (d <= 3) return { key: 'urgente', label: 'Vence em breve', color: 'var(--c-danger)', cls: 'danger-card', dias: d };
  if (d <= 7) return { key: 'proxima', label: 'Próxima do vencimento', color: 'var(--c-warn)', cls: 'warn-card', dias: d };
  return { key: 'ativa', label: 'Ativa', color: 'var(--c-success)', cls: 'success-card', dias: d };
}

      <div class="main">
        <div class="name">${c.aula}</div>
        <div class="sub">${brDate(c.data)} às ${c.hora}</div>
      </div>
      <span class="badge ${c.status==='validado' ? 'success' : 'warn'}">${c.status}</span>
    </div>
  `).join('')}</div>`;
}

/* ----- Check-in (aluno) ----- */
function pageStudentCheckin(root) {
  const s = myStudent();
  const today = todayISO();
  const myCheckins = DB.checkins.filter(c => c.studentId === s.id).sort((a,b) => (b.data+b.hora).localeCompare(a.data+a.hora));
  const alreadyToday = myCheckins.some(c => c.data === today);

  root.innerHTML = `
    <div class="page-title"><h1>Check-in</h1></div>
    <p class="page-subtitle">Marque sua presença ao chegar na aula. A academia valida o check-in para contar no seu progresso de faixa.</p>

    <div class="card" style="text-align:center;">
      ${alreadyToday
        ? `<div style="padding:20px;">
            <div style="font-size:3rem; color:var(--c-success); margin-bottom:10px">✓</div>
            <h3>Check-in feito hoje!</h3>
            <p style="color:var(--c-text-dim)">Sua presença foi registrada. Aguarde validação da academia.</p>
          </div>`
        : `<button class="checkin-btn" id="btnDoCheckin">
            <span class="icon">✓</span>
            <span>Fazer check-in agora</span>
          </button>`
      }
    </div>

    ${!alreadyToday ? `
    <div class="card" style="margin-top:16px;">
      <div class="card-header"><h3>Qual aula?</h3></div>
      <div class="field"><label>Modalidade</label>
        <select id="f_aula">
          ${(currentAcademy().modalidades||['Jiu-Jitsu','MMA']).map(m => `<option>${m}</option>`).join('')}
        </select>
      </div>
      <div class="field-row">
        <div class="field"><label>Data</label><input id="f_data" type="date" value="${today}"></div>
        <div class="field"><label>Horário</label><input id="f_hora" type="time" value="${new Date().toTimeString().slice(0,5)}"></div>
      </div>
    </div>
    ` : ''}

    <div class="card" style="margin-top:16px;">
      <div class="card-header"><h3>Histórico de presenças</h3></div>
      ${myCheckins.length ? renderStudentCheckinList(myCheckins) : `<div class="empty">Você ainda não fez check-ins</div>`}
    </div>
  `;

  const btn = document.getElementById('btnDoCheckin');
  if (btn) btn.addEventListener('click', doStudentCheckin);
}

function doStudentCheckin() {
  const s = myStudent();
  const aula = document.getElementById('f_aula')?.value || 'Jiu-Jitsu';
  const data = document.getElementById('f_data')?.value || todayISO();
  const hora = document.getElementById('f_hora')?.value || new Date().toTimeString().slice(0,5);
  // Verificar mensalidade
  const st = mensalidadeStatus(s);
  if (st.key === 'vencida') {
    if (!confirm('Sua mensalidade está vencida. Deseja fazer o check-in mesmo assim? (A academia pode negar)')) return;
  }
  DB.checkins.push({ id: uid(), studentId: s.id, data, hora, aula, status: 'pendente' });
  saveDB();
  toast('Check-in realizado! Aguardando validação.', 'success');
  goToPage('checkin');
}

/* ----- Mensalidade / pagamento ----- */
function pageStudentMensalidade(root) {
  const s = myStudent();
  const st = mensalidadeStatus(s);
  const myPayments = DB.payments.filter(p => p.studentId === s.id).sort((a,b) => b.data.localeCompare(a.data));

  let alertHtml = '';
  if (st.key === 'vencida') alertHtml = `<div class="alert danger">${ICO.alert}<div><strong>Mensalidade vencida há ${st.dias} dia${st.dias>1?'s':''}</strong>Regularize para continuar treinando.</div></div>`;
  else if (st.key === 'urgente') alertHtml = `<div class="alert warn">${ICO.alert}<div><strong>Vence em ${st.dias} dia${st.dias>1?'s':''}</strong>Evite atrasos.</div></div>`;

  root.innerHTML = `
    <div class="page-title"><h1>Mensalidade</h1></div>
    ${alertHtml}

    <div class="hero-mensalidade" style="background: linear-gradient(135deg, ${st.cls === 'danger-card' ? '#dc2626, #991b1b' : st.cls === 'warn-card' ? '#f59e0b, #b45309' : st.cls === 'success-card' ? '#10b981, #047857' : 'var(--c-primary), #222'});">
      <div class="top">Valor da mensalidade</div>
      <div class="big">${BRL(s.mensalidadeValor)}</div>
      <div class="desc">${st.label}</div>
      <div class="meta">Vencimento: ${brDate(s.dataVencimento)}</div>
      <div style="margin-top:14px;">
        <button class="btn accent" onclick="openModalPagamento()">Pagar agora</button>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="card-header"><h3>Histórico de pagamentos</h3></div>
      ${myPayments.length ? `<div class="list">
        ${myPayments.map(p => `
          <div class="list-item">
            <div class="avatar" style="background: ${p.status==='pago' ? 'var(--c-success)' : 'var(--c-warn)'}">${p.status==='pago' ? '✓' : '?'}</div>
            <div class="main">
              <div class="name">${BRL(p.valor)} · ${metodoLabel(p.metodo)}</div>
              <div class="sub">${brDate(p.data)} — Competência ${fmtMonth(p.competencia)}</div>
            </div>
            <span class="badge ${p.status==='pago' ? 'success' : 'warn'}">${p.status}</span>
          </div>
        `).join('')}
      </div>` : `<div class="empty">Nenhum pagamento registrado</div>`}
    </div>
  `;
}

function openModalPagamento() {
  openModal(`
    <button class="modal-close" onclick="closeModal()">${ICO.close}</button>
    <h2>Escolha a forma de pagamento</h2>
    <p style="color:var(--c-text-dim); font-size:.88rem">Versão demo — pagamento simulado. Nenhum valor real será cobrado.</p>
    <div class="grid grid-2" style="gap:12px; margin-top:10px;">
      <button class="card" style="text-align:left; cursor:pointer; transition: border-color .15s;" onmouseover="this.style.borderColor='var(--c-primary)'" onmouseout="this.style.borderColor='var(--c-border)'" onclick="startPayment('pix')">
        <div style="width:44px; height:44px; border-radius:12px; background:var(--c-primary); color:var(--c-primary-contrast); display:grid; place-items:center; margin-bottom:10px;">${ICO.pix}</div>
        <div style="font-weight:700">PIX</div>
        <div style="font-size:.82rem; color:var(--c-text-dim)">Confirmação instantânea</div>
      </button>
      <button class="card" style="text-align:left; cursor:pointer;" onmouseover="this.style.borderColor='var(--c-primary)'" onmouseout="this.style.borderColor='var(--c-border)'" onclick="startPayment('credito')">
        <div style="width:44px; height:44px; border-radius:12px; background:var(--c-primary); color:var(--c-primary-contrast); display:grid; place-items:center; margin-bottom:10px;">${ICO.card}</div>
        <div style="font-weight:700">Cartão de Crédito</div>
        <div style="font-size:.82rem; color:var(--c-text-dim)">Em até 3x sem juros</div>
      </button>
      <button class="card" style="text-align:left; cursor:pointer;" onmouseover="this.style.borderColor='var(--c-primary)'" onmouseout="this.style.borderColor='var(--c-border)'" onclick="startPayment('debito')">
        <div style="width:44px; height:44px; border-radius:12px; background:var(--c-primary); color:var(--c-primary-contrast); display:grid; place-items:center; margin-bottom:10px;">${ICO.card}</div>
        <div style="font-weight:700">Cartão de Débito</div>
        <div style="font-size:.82rem; color:var(--c-text-dim)">Débito à vista</div>
      </button>
      <button class="card" style="text-align:left; cursor:pointer;" onmouseover="this.style.borderColor='var(--c-primary)'" onmouseout="this.style.borderColor='var(--c-border)'" onclick="startPayment('boleto')">
        <div style="width:44px; height:44px; border-radius:12px; background:var(--c-primary); color:var(--c-primary-contrast); display:grid; place-items:center; margin-bottom:10px;">${ICO.money}</div>
        <div style="font-weight:700">Boleto</div>
        <div style="font-size:.82rem; color:var(--c-text-dim)">Compensação em até 3 dias</div>
      </button>
    </div>
  `, { wide: true });
}

function startPayment(metodo) {
  const s = myStudent();
  if (metodo === 'pix') {
    openModal(`
      <button class="modal-close" onclick="closeModal()">${ICO.close}</button>
      <h2>Pagamento via PIX</h2>
      <p style="color:var(--c-text-dim); font-size:.88rem">Escaneie o QR Code com o app do seu banco ou copie o código abaixo.</p>
      <div class="pix-qr"></div>
      <div class="pix-code" id="pixCode">00020126580014BR.GOV.BCB.PIX0136${uid()}5204000053039865802BR5913${currentAcademy().nome.slice(0,13)}6008BRASILIA62070503***6304${Math.floor(Math.random()*9000+1000)}</div>
      <button class="btn small secondary" onclick="copyPix()">Copiar código PIX</button>
      <div style="margin-top:12px; padding: 12px; background: var(--c-surface-2); border-radius:10px; text-align:center;">
        <div style="font-size:.8rem; color:var(--c-text-dim)">Valor</div>
        <div style="font-size:1.5rem; font-weight:700">${BRL(s.mensalidadeValor)}</div>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn success" onclick="confirmPayment('pix')">Simular pagamento</button>
      </div>
    `);
  } else if (metodo === 'credito' || metodo === 'debito') {
    openModal(`
      <button class="modal-close" onclick="closeModal()">${ICO.close}</button>
      <h2>Cartão de ${metodo === 'credito' ? 'Crédito' : 'Débito'}</h2>
      <div class="field"><label>Número do cartão</label><input id="cc_num" placeholder="0000 0000 0000 0000" maxlength="19"></div>
      <div class="field"><label>Nome no cartão</label><input id="cc_name" placeholder="NOME COMPLETO"></div>
      <div class="field-row">
        <div class="field"><label>Validade</label><input id="cc_exp" placeholder="MM/AA" maxlength="5"></div>
        <div class="field"><label>CVV</label><input id="cc_cvv" placeholder="123" maxlength="4"></div>
      </div>
      ${metodo === 'credito' ? `<div class="field"><label>Parcelas</label><select id="cc_parc">
        <option value="1">1x de ${BRL(s.mensalidadeValor)} sem juros</option>
        <option value="2">2x de ${BRL(s.mensalidadeValor/2)} sem juros</option>
        <option value="3">3x de ${BRL(s.mensalidadeValor/3)} sem juros</option>
      </select></div>` : ''}
      <div class="modal-actions">
        <button class="btn secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn success" onclick="confirmPayment('${metodo}')">Pagar ${BRL(s.mensalidadeValor)}</button>
      </div>
    `);
  } else if (metodo === 'boleto') {
    openModal(`
      <button class="modal-close" onclick="closeModal()">${ICO.close}</button>
      <h2>Boleto bancário</h2>
      <p style="color:var(--c-text-dim); font-size:.88rem">Seu boleto foi gerado. Copie a linha digitável ou baixe o PDF.</p>
      <div class="pix-code" style="font-size:.85rem">34191.79001 01043.510047 91020.150008 ${Math.floor(Math.random()*9+1)} 9${Math.floor(Math.random()*9000000000000+1000000000000)}</div>
      <div style="margin-top:12px; padding: 12px; background: var(--c-surface-2); border-radius:10px; text-align:center;">
        <div style="font-size:.8rem; color:var(--c-text-dim)">Valor · Vencimento em 3 dias úteis</div>
        <div style="font-size:1.5rem; font-weight:700">${BRL(s.mensalidadeValor)}</div>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" onclick="closeModal()">Fechar</button>
        <button class="btn success" onclick="confirmPayment('boleto')">Simular compensação</button>
      </div>
    `);
  }
}

function copyPix() {
  const code = document.getElementById('pixCode').textContent;
  navigator.clipboard.writeText(code).then(() => toast('Código copiado!', 'success'));
}

function confirmPayment(metodo) {
  const s = myStudent();
  // Registra pagamento
  DB.payments.push({
    id: uid(), studentId: s.id, valor: s.mensalidadeValor, data: todayISO(),
    metodo: metodo === 'boleto' ? 'dinheiro' : metodo, status: 'pago', competencia: todayISO().slice(0,7),
  });
  // Renova vencimento +30 dias
  const base = new Date(Math.max(new Date(s.dataVencimento).getTime(), Date.now()));
  base.setDate(base.getDate() + 30);
  s.dataVencimento = base.toISOString().slice(0,10);
  saveDB();

  // Tela de sucesso
  openModal(`
    <div style="text-align:center; padding:20px 0;">
      <div style="width:80px; height:80px; margin:0 auto 18px; background: var(--c-success); border-radius:50%; display:grid; place-items:center; color:#fff; font-size:2.5rem;">✓</div>
      <h2>Pagamento confirmado!</h2>
      <p style="color:var(--c-text-dim)">${BRL(s.mensalidadeValor)} via ${metodoLabel(metodo)}</p>
      <div style="margin-top:14px; padding: 12px; background: var(--c-surface-2); border-radius:10px;">
        <div style="font-size:.8rem; color:var(--c-text-dim)">Novo vencimento</div>
        <div style="font-size:1.2rem; font-weight:700">${brDate(s.dataVencimento)}</div>
      </div>
      <button class="btn block" style="margin-top:16px;" onclick="closeModal(); goToPage('mensalidade');">OK</button>
    </div>
  `);
  toast('Pagamento realizado!', 'success');
}

/* ----- Minha graduação ----- */
function pageStudentGraduacao(root) {
  const s = myStudent();
  const ord = s.categoria === 'adulto' ? FAIXAS_ADULTO : FAIXAS_INFANTIL;
  const idx = ord.indexOf(s.faixa);
  const prox = idx < ord.length - 1 ? ord[idx + 1] : null;
  const progresso = (s.presencasValidadas % DB.aulasPorGrau) / DB.aulasPorGrau * 100;
  const aulasRestantes = DB.aulasPorGrau - (s.presencasValidadas % DB.aulasPorGrau);

  root.innerHTML = `
    <div class="page-title"><h1>Minha Graduação</h1></div>

    <div class="card">
      <div style="display:flex; flex-direction:column; align-items:center; padding:20px 0; gap:10px;">
        <div style="width:80px; height:20px; border-radius:4px; background: ${FAIXA_COLORS[s.faixa]}; border:2px solid rgba(0,0,0,.3); position:relative;">
          <div style="position:absolute; right:10px; top:3px; width:14px; height:14px; background:#111; border-radius:2px;"></div>
        </div>
        <div style="font-size:1.5rem; font-weight:800">Faixa ${faixaTitle(s.faixa)}</div>
        <div style="color:var(--c-text-dim); font-size:.9rem">${s.graus} grau${s.graus!==1?'s':''} · ${s.categoria}</div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="card-header"><h3>Progresso para o próximo grau</h3></div>
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <div style="font-size:.9rem">${s.presencasValidadas % DB.aulasPorGrau} de ${DB.aulasPorGrau} presenças</div>
        <div style="font-size:.9rem; font-weight:600">${progresso.toFixed(0)}%</div>
      </div>
      <div class="progress"><div style="width:${progresso}%"></div></div>
      <p style="color:var(--c-text-dim); font-size:.85rem; margin-top:8px;">
        Faltam <strong>${aulasRestantes}</strong> presenças validadas pela academia.
      </p>
    </div>

    ${prox ? `
    <div class="card" style="margin-top:16px;">
      <div class="card-header"><h3>Próxima faixa</h3></div>
      <div style="display:flex; align-items:center; gap:14px;">
        <div style="width:60px; height:16px; border-radius:3px; background: ${FAIXA_COLORS[prox]}; border: 1px solid rgba(0,0,0,.25);"></div>
        <div>
          <div style="font-weight:700; font-size:1.05rem">${faixaTitle(prox)}</div>
          <div style="color:var(--c-text-dim); font-size:.85rem">Conquiste os ${GRAUS_PARA_FAIXA} graus da ${faixaTitle(s.faixa)} para promover</div>
        </div>
      </div>
    </div>` : `
    <div class="card" style="margin-top:16px;">
      <div class="alert success">${ICO.info}<div><strong>Parabéns!</strong> Você já está na faixa máxima.</div></div>
    </div>`}

    <div class="card" style="margin-top:16px;">
      <div class="card-header"><h3>Sequência completa de faixas</h3></div>
      <div style="display:flex; flex-wrap:wrap; gap:8px;">
        ${ord.map((f, i) => `
          <div style="padding:8px 12px; border-radius:10px; border:1px solid var(--c-border); background: ${i === idx ? 'var(--c-surface-2)' : 'transparent'}; ${i === idx ? 'border-color: var(--c-primary)' : ''}">
            <div style="display:flex; align-items:center; gap:8px;">
              <div style="width:24px; height:10px; border-radius:2px; background: ${FAIXA_COLORS[f]}; border: 1px solid rgba(0,0,0,.25);"></div>
              <span style="font-size:.85rem; font-weight:${i===idx?'700':'500'}">${faixaTitle(f)}${i===idx?' (atual)':''}</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function salvarPerfilAluno() {
  const s = myStudent();
  s.nome = document.getElementById('pf_nome').value.trim() || s.nome;
  s.email = document.getElementById('pf_email').value;
  s.telefone = document.getElementById('pf_tel').value;
  s.nascimento = document.getElementById('pf_nasc').value;
  saveDB();
  document.getElementById('userName').textContent = s.nome;
  document.getElementById('userAvatar').textContent = initials(s.nome);
  toast('Perfil atualizado', 'success');
}

/* ================================================================
   BOOT
   ================================================================ */
document.addEventListener('DOMContentLoaded', () => {
  loadDB();
  loadSession();
  applyTheme();

  // Login buttons
  document.querySelectorAll('.profile-btn').forEach(btn => {
    btn.addEventListener('click', () => loginAs(btn.dataset.profile));
  });
  document.getElementById('btnLogout').addEventListener('click', logout);
  document.getElementById('switchAcademyLink').addEventListener('click', e => {
    e.preventDefault();
    toast('Versão demo: apenas a academia Alpha Force está configurada. Use "Configurações" após entrar como academia para trocar nome/logo/cores.', '', 4500);
  });

  document.getElementById('btnNotifications').addEventListener('click', () => {
    // Mostra resumo de alertas
    if (SESSION?.role === 'academia') {
      const vencidos = DB.students.filter(s => { const d = diffDays(s.dataVencimento); return d !== null && d < 0; }).length;
      const pend = DB.checkins.filter(c => c.status === 'pendente').length;
      toast(`${vencidos} aluno(s) em atraso · ${pend} check-in(s) pendente(s)`, '', 4000);
    } else if (SESSION?.role === 'aluno') {
      const s = myStudent();
      const st = mensalidadeStatus(s);
      toast(`Mensalidade: ${st.label}`, '', 3000);
    } else {
      toast('Faça login para ver notificações', '', 2500);
    }
  });

  // Auto-login se houver sessão
  if (SESSION && SESSION.role) {
    try { enterApp(); } catch(e) { showLogin(); }
  } else {
    showLogin();
  }
});
</script>
